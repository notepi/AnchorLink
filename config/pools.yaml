# ============================================================
# 第二层：股票池定义
# 四类池子：direct_peers, industry_chain, theme_pool, trading_watchlist
# ============================================================
universes:
  - universe_id: direct_peers
    display_name: 核心同类池
    purpose: "真正业务可比公司，用于判断 Anchor 相对核心业务强弱"
    can_be_benchmark: true
    min_size: 1
    description: |
      与铂力特业务直接可比的公司：
      - 同属增材制造赛道
      - 业务模式相似（零件制造服务 vs 设备制造）
      - 技术路线相近（金属3D打印）

  - universe_id: industry_chain
    display_name: 产业链池
    purpose: "上下游和需求传导，用于判断产业链联动"
    can_be_benchmark: true
    min_size: 3
    description: |
      铂力特产业链上下游：
      - 上游：原材料供应商
      - 下游：火箭发动机、卫星结构件等需求端
      - 同产业链的公司走势联动反映需求景气度

  - universe_id: theme_pool
    display_name: 主题情绪池
    purpose: "主题热度和扩散，用于判断市场主题情绪"
    can_be_benchmark: false
    min_size: 3
    description: |
      商业航天、军工、3D打印主题相关标的：
      - 用于观察主题热度是否升温
      - 判断情绪是否向核心业务传导
      - 不适合作为 benchmark（主题炒作不代表业务确认）

  - universe_id: trading_watchlist
    display_name: 交易观察池
    purpose: "短期资金切换和异动，用于捕捉交易机会"
    can_be_benchmark: false
    min_size: 1
    description: |
      短期资金关注标的：
      - 交易联动性强但业务逻辑不纯
      - 用于捕捉资金切换信号
      - 不参与 benchmark 计算

