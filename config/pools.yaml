# ============================================================
# 第二层：股票池定义
# 四类池子：direct_peers, industry_chain, theme_pool, trading_watchlist
# ============================================================
universes:
  - universe_id: direct_peers
    display_name: 增材制造本业确认池
    purpose: "判断铂力特是否存在增材制造本业共振，而非商业航天或军工情绪带动"
    can_be_benchmark: true
    min_size: 2
    description: |
      与铂力特业务直接可比的公司：
      - 同属增材制造赛道
      - 业务模式相似（零件制造服务 vs 设备制造）
      - 技术路线相近（金属3D打印）

  - universe_id: industry_chain
    display_name: 商业航天硬科技主池
    purpose: "判断商业航天硬件链是否向铂力特估值主线传导"
    can_be_benchmark: true
    min_size: 5
    description: |
      商业航天硬科技链主 benchmark：
      - 火箭、卫星、星载电子、结构件、发动机材料、连接器等硬件链
      - 用于判断产业链景气是否向铂力特传导
      - 只放硬科技制造链，不放纯应用层主题票

  - universe_id: theme_pool
    display_name: 商业航天主题温度计
    purpose: "观察商业航天、卫星互联网、北斗、遥感、空天信息等主题情绪扩散，不参与 benchmark"
    can_be_benchmark: false
    min_size: 4
    description: |
      商业航天主题温度计：
      - 卫星通信运营、导航、遥感、GIS应用等
      - 判断主题热度是否扩散
      - 与 industry_chain 区别：看应用层和情绪扩散，不看硬科技制造链

  - universe_id: trading_watchlist
    display_name: 交易联动与风险映射池
    purpose: "捕捉臻镭科技、军工电子、高 beta 商业航天票对铂力特短线波动的解释力"
    can_be_benchmark: false
    min_size: 1
    description: |
      交易联动与风险映射池：
      - 短线解释池，不参与 benchmark
      - 重点看近5日、近10日、近20日相关性
      - 可与其他池子复用同一只股票

